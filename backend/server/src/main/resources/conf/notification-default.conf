notification {
  aws {
    region = ${?AWS_REGION}
  }

  sqs {
    queueUrl = ${?NOTIFICATION_QUEUE_URL}
    dlqUrl = ${?NOTIFICATION_DLQ_URL}
    visibilityTimeoutSeconds = 300
    waitTimeSeconds = 20
    maxReceiveCount = 3
  }

  ses {
    configurationSetName = ${?SES_CONFIGURATION_SET_NAME}
  }

  retry {
    maxAttempts = 3
    maxAttempts = ${?NOTIFICATION_RETRY_MAX_ATTEMPTS}
    initialDelayMs = 1000
    initialDelayMs = ${?NOTIFICATION_RETRY_INITIAL_DELAY_MS}
    maxDelayMs = 30000
    maxDelayMs = ${?NOTIFICATION_RETRY_MAX_DELAY_MS}
    multiplier = 2.0
    multiplier = ${?NOTIFICATION_RETRY_MULTIPLIER}
  }

  worker {
    batchSize = 10
    batchSize = ${?NOTIFICATION_WORKER_BATCH_SIZE}
    visibilityTimeoutSeconds = 60
    visibilityTimeoutSeconds = ${?NOTIFICATION_WORKER_VISIBILITY_TIMEOUT}
    pollIntervalSeconds = 1
    pollIntervalSeconds = ${?NOTIFICATION_WORKER_POLL_INTERVAL}
    enabled = true
    enabled = ${?NOTIFICATION_WORKER_ENABLED}
  }
}

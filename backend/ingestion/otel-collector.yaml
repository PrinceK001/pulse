receivers:
  otlp:
    protocols:
      grpc: # Ensure GRPC is enabled for the Java Agent
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  # file_storage:
  #   directory: /var/lib/otelcol-contrib/storage

processors:
  batch:
    send_batch_size: 50000
    timeout: 1s
    send_batch_max_size: 75000

exporters:
  clickhouse:
    # driven by env vars from docker-compose
    endpoint: ${CLICKHOUSE_ENDPOINT}
    database: ${CLICKHOUSE_DATABASE}
    username: ${CLICKHOUSE_USER}
    password: ${CLICKHOUSE_PASSWORD}

    create_schema: false
    traces_table_name: otel_traces
    logs_table_name: otel_logs
    metrics_table_name: otel_metrics_gauge
    async_insert: false
    timeout: 10s
    # sending_queue:
    #   storage: file_storage
    #   sizer: bytes
    #   queue_size: 10000000000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  otlphttp/pulse:
    endpoint: http://pulse-server:8080
    tls:
      insecure: true
    compression: gzip
    retry_on_failure:
      enabled: false
    sending_queue:
      enabled: true
      queue_size: 1000

  # NEW: Prometheus Exporter (Metrics)
  prometheus:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: true
    #namespace: "pulse_server"

  # NEW: Tempo Exporter (Traces)
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # NEW: Send logs to Loki via OTLP
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true

connectors:
  routing/pulse:
    default_pipelines: [ logs/to-clickhouse ]
    table:
      - context: log
        statement: route() where attributes["pulse.type"] != nil and (attributes["pulse.type"] == "device.anr" or attributes["pulse.type"] == "device.crash" or attributes["pulse.type"] == "non_fatal")
        pipelines: [ logs/to-backend ]

  spanmetrics:
    namespace: span.metrics # Adds a prefix to avoid collisions
    # Optional: Define buckets for better P95/P99 accuracy
    histogram:
      explicit:
        buckets: [2ms, 10ms, 50ms, 100ms, 200ms, 500ms, 1s, 5s]
    dimensions: # Turn these span attributes into metric labels
      - name: http.method
      - name: http.request.method
      - name: http.status_code
      - name: http.response.status_code
      - name: http.route

service:
  extensions: [ health_check ]

  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ clickhouse, otlp/tempo, spanmetrics ]

    metrics:
      receivers: [ otlp, spanmetrics ]
      processors: [ batch ]
      exporters: [ clickhouse, prometheus ]

    # Entry pipeline -> route via connector
    logs/in:
      receivers: [ otlp ]
      exporters: [ routing/pulse ]

    # Matched pulse.type -> backend
    logs/to-backend:
      receivers: [ routing/pulse ]
      processors: [ batch ]
      exporters: [ otlphttp/pulse ]

    # Everything else -> ClickHouse
    logs/to-clickhouse:
      receivers: [ routing/pulse ]
      processors: [ batch ]
      exporters: [ clickhouse ]

    # NEW: Logs Pipeline
    logs/loki:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
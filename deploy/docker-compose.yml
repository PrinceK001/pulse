services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: pulse-mysql
    ports:
      - "3307:3306"  # Using 3307 on host to avoid conflicts
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-pulse_root_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-pulse_db}
      - MYSQL_USER=${MYSQL_USER:-pulse_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-pulse_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - pulse-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-pulse_user}", "-p${MYSQL_PASSWORD:-pulse_password}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════════
  # OpenFGA Database Migration (runs first, creates schema - idempotent)
  # ═══════════════════════════════════════════════════════════════════════════════
  openfga-migrate:
    image: alpine:3.19
    container_name: pulse-openfga-migrate
    command: [ "/bin/sh", "/scripts/migrate-openfga.sh" ]
    environment:
      - OPENFGA_VERSION=1.5.3
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=pulse_user
      - MYSQL_PASSWORD=pulse_password
      - MYSQL_DATABASE=openfga
    volumes:
      - ./openfga:/scripts:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pulse-network
    restart: "no"

  # ═══════════════════════════════════════════════════════════════════════════════
  # OpenFGA Authorization Service (uses MySQL for storage)
  # ═══════════════════════════════════════════════════════════════════════════════
  openfga:
    image: openfga/openfga:v1.5.3
    container_name: pulse-openfga
    command: run
    environment:
      - OPENFGA_DATASTORE_ENGINE=mysql
      - OPENFGA_DATASTORE_URI=pulse_user:pulse_password@tcp(mysql:3306)/openfga?parseTime=true
      - OPENFGA_PLAYGROUND_ENABLED=true
    ports:
      - "8180:8080"   # HTTP API (using 8180 to avoid conflicts)
      - "8181:8081"   # gRPC API
      - "3001:3000"   # Playground UI
    depends_on:
      mysql:
        condition: service_healthy
      openfga-migrate:
        condition: service_completed_successfully
    networks:
      - pulse-network
    restart: unless-stopped
    # Note: No healthcheck - OpenFGA distroless image has no shell/curl
    # The init script waits for /healthz endpoint directly

  # OpenFGA Initialization (creates store/model after server is ready - idempotent)
  openfga-init:
    image: alpine:3.19
    container_name: pulse-openfga-init
    command: [ "/bin/sh", "/scripts/init-openfga.sh" ]
    environment:
      - OPENFGA_URL=http://openfga:8080
    volumes:
      - ./openfga:/scripts:ro
    depends_on:
      openfga:
        condition: service_started  # Init script waits for OpenFGA via curl
    networks:
      - pulse-network
    restart: "no"

  # ClickHouse Database (OTEL data only - traces, logs, metrics)
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: pulse-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native client
    environment:
      - CLICKHOUSE_DB=${OTEL_CLICKHOUSE_DATABASE:-otel}
      - CLICKHOUSE_USER=${OTEL_CLICKHOUSE_USER:-pulse_user}
      - CLICKHOUSE_PASSWORD=${OTEL_CLICKHOUSE_PASSWORD:-pulse_password}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../backend/ingestion/clickhouse-otel-schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - pulse-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--query", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ClickHouse Table Initializer (runs once to ensure tables exist)
  clickhouse-init:
    image: clickhouse/clickhouse-server:24.8
    container_name: pulse-clickhouse-init
    command: /bin/bash /scripts/init-clickhouse.sh
    volumes:
      - ./scripts/init-clickhouse.sh:/scripts/init-clickhouse.sh:ro
      - ../backend/ingestion/clickhouse-otel-schema.sql:/init/clickhouse-otel-schema.sql:ro
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=${OTEL_CLICKHOUSE_USER:-pulse_user}
      - CLICKHOUSE_PASSWORD=${OTEL_CLICKHOUSE_PASSWORD:-pulse_password}
      - CLICKHOUSE_DB=${OTEL_CLICKHOUSE_DATABASE:-otel}
    networks:
      - pulse-network
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"  # Only run once

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.137.0
    container_name: pulse-otel-collector
    command: [ "--config=/etc/otel-collector.yaml" ]
    volumes:
      - ../backend/ingestion/otel-collector.yaml:/etc/otel-collector.yaml:ro
    networks:
      - pulse-network
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    # Healthcheck disabled: the contrib image is scratch-based (no shell,
    # wget, or curl). Health is verified externally via :13133.
    healthcheck:
      disable: true
    environment:
      - CLICKHOUSE_ENDPOINT=tcp://clickhouse:9000
      - CLICKHOUSE_DATABASE=${OTEL_CLICKHOUSE_DATABASE:-otel}
      - CLICKHOUSE_USER=${OTEL_CLICKHOUSE_USER:-pulse_user}
      - CLICKHOUSE_PASSWORD=${OTEL_CLICKHOUSE_PASSWORD:-pulse_password}
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics (collector internal)
      - "13133:13133" # Health check

  # Pulse UI Service (React Frontend)
  pulse-ui:
    build:
      context: ../pulse-ui
      dockerfile: Dockerfile
      args:
        REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID}
        REACT_APP_PULSE_SERVER_URL: ${REACT_APP_PULSE_SERVER_URL}
        REACT_APP_GOOGLE_OAUTH_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
        REACT_APP_FIREBASE_API_KEY: ${REACT_APP_FIREBASE_API_KEY}
        REACT_APP_FIREBASE_AUTH_DOMAIN: ${REACT_APP_FIREBASE_AUTH_DOMAIN}
        REACT_APP_FIREBASE_PROJECT_ID: ${CONFIG_SERVICE_APPLICATION_GCP_PROJECT_ID}
        REACT_APP_FIREBASE_STORAGE_BUCKET: ${REACT_APP_FIREBASE_STORAGE_BUCKET}
        REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${REACT_APP_FIREBASE_MESSAGING_SENDER_ID}
        REACT_APP_FIREBASE_APP_ID: ${REACT_APP_FIREBASE_APP_ID}
    container_name: pulse-ui
    ports:
      - "3000:8080"
    environment:
      - NODE_ENV=production
    networks:
      - pulse-network
    depends_on:
      pulse-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthcheck.txt" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Vector Service (Data Collector)
  vector:
    build:
      context: ../vector
      dockerfile: Dockerfile
      args:
        VECTOR_REPO: https://github.com/parth-modh/vector
        VECTOR_REF: forked/multi-bucket
        DEBIAN_VERSION: "12"
    container_name: vector
    command: [ ]
    environment:
      - VECTOR_LOG=debug
    volumes:
      - ../vector/vector.yaml:/etc/vector/vector.yaml:ro
      - vector-data:/var/lib/vector
    networks:
      - pulse-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/usr/bin/vector", "validate", "--config-dir", "/etc/vector" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "8686:8686"
      - "14317:4317"   # OTLP gRPC (host 14317 to avoid conflict with otel-collector on 4317)
      - "14318:4318"   # OTLP HTTP (script sends here to reach Vector)

  # Pulse Server Service (Java/Vert.x Backend)
  pulse-server:
    build:
      context: ../backend/server
      dockerfile: Dockerfile
    container_name: pulse-server
    ports:
      - "8080:8080"
    environment:
      # AWS Credentials for S3/Athena access
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}

      # MySQL Database Configuration
      - MYSQL_WRITER_HOST=mysql
      - MYSQL_READER_HOST=mysql
      - MYSQL_DATABASE=${MYSQL_DATABASE:-pulse_db}
      - MYSQL_USER=${MYSQL_USER:-pulse_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-pulse_password}
      - MYSQL_WRITER_MAX_POOL_SIZE=${MYSQL_WRITER_MAX_POOL_SIZE:-10}
      - MYSQL_READER_MAX_POOL_SIZE=${MYSQL_READER_MAX_POOL_SIZE:-10}

      # Application Configuration
      - CONFIG_SERVICE_APPLICATION_CRONMANAGERBASEURL=${CONFIG_SERVICE_APPLICATION_CRONMANAGERBASEURL:-http://pulse-alerts-cron:4000/cron}
      - CONFIG_SERVICE_APPLICATION_SERVICEURL=${CONFIG_SERVICE_APPLICATION_SERVICEURL:-http://pulse-server:8080}
      - CONFIG_SERVICE_APPLICATION_GOOGLEOAUTHCLIENTID=${CONFIG_SERVICE_APPLICATION_GOOGLEOAUTHCLIENTID}
      - CONFIG_SERVICE_APPLICATION_GOOGLEOAUTHENABLED=${GOOGLE_OAUTH_ENABLED:-false}
      - CONFIG_SERVICE_APPLICATION_JWTSECRET=${CONFIG_SERVICE_APPLICATION_JWTSECRET:-dev-secret-key-at-least-32-characters-long-for-local-testing-only}
      - CONFIG_SERVICE_APPLICATION_WEBHOOKURL=${CONFIG_SERVICE_APPLICATION_WEBHOOKURL}

      # ClickHouse Database Configuration
      - CLICKHOUSE_R2DBC_URL=r2dbc:clickhouse:http://clickhouse:8123/${OTEL_CLICKHOUSE_DATABASE:-otel}
      - CLICKHOUSE_USERNAME=${OTEL_CLICKHOUSE_USER:-pulse_user}
      - CLICKHOUSE_PASSWORD=${OTEL_CLICKHOUSE_PASSWORD:-pulse_password}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - ENCRYPTION_MASTER_KEY=${VAULT_ENCRYPTION_MASTER_KEY}

      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST:-ascend-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}

      # S3 Configuration
      - S3_BUCKET_NAME=${CONFIG_S3_BUCKET_NAME:-pulse-config}
      - CONFIG_DETAILS_S3_FILE_PATH=${CONFIG_DETAILS_S3_FILE_PATH:-config/pulse-config.json}
      - INTERACTION_DETAILS_S3_FILE_PATH=${INTERACTION_DETAILS_S3_FILE_PATH:-config/interaction-config.json}

      # CloudFront Configuration
      - CLOUDFRONT_DISTRIBUTION_ID=${CONFIG_CLOUDFRONT_DISTRIBUTION_ID:-NONE}
      - CONFIG_CLOUDFRONT_ASSET_PATH=${CONFIG_CLOUDFRONT_ASSET_PATH:-/config/pulse-config.json}
      - INTERACTION_CLOUDFRONT_ASSET_PATH=${INTERACTION_CLOUDFRONT_ASSET_PATH:-/config/interaction-config.json}

      # OpenTelemetry Configuration
      - INTERACTION_CONFIG_URL=${INTERACTION_CONFIG_URL}
      - LOGS_COLLECTOR_URL=${LOGS_COLLECTOR_URL}
      - METRIC_COLLECTOR_URL=${METRIC_COLLECTOR_URL}
      - SPAN_COLLECTOR_URL=${SPAN_COLLECTOR_URL}
      - CUSTOM_EVENT_COLLECTOR_URL=${CUSTOM_EVENT_COLLECTOR_URL}
      # Query Engine Configuration
      - CONFIG_SERVICE_APPLICATION_QUERY_ENGINE=${CONFIG_SERVICE_APPLICATION_QUERY_ENGINE:-athena}
      # Athena Configuration (only used when QUERY_ENGINE=athena)
      - CONFIG_SERVICE_APPLICATION_ATHENA_REGION=${CONFIG_SERVICE_APPLICATION_ATHENA_REGION:-ap-south-1}
      - CONFIG_SERVICE_APPLICATION_ATHENA_DATABASE=${CONFIG_SERVICE_APPLICATION_ATHENA_DATABASE:-pulse_athena_db}
      - CONFIG_SERVICE_APPLICATION_ATHENA_OUTPUT_LOCATION=${CONFIG_SERVICE_APPLICATION_ATHENA_OUTPUT_LOCATION:-s3://puls-otel-config/}
      # GCP Configuration (only used when QUERY_ENGINE=gcp)
      - CONFIG_SERVICE_APPLICATION_GCP_PROJECT_ID=${CONFIG_SERVICE_APPLICATION_GCP_PROJECT_ID}
      # - CONFIG_SERVICE_APPLICATION_GCP_DATASET=${CONFIG_SERVICE_APPLICATION_GCP_DATASET}

      # OpenFGA Authorization Configuration
      - OPENFGA_API_URL=${OPENFGA_API_URL:-http://openfga:8180}
      # OpenFGA will auto-fetch storeId/modelId if enabled and not provided
      - OPENFGA_STORE_ID=${OPENFGA_STORE_ID:-}
      - OPENFGA_MODEL_ID=${OPENFGA_MODEL_ID:-}
      - OPENFGA_ENABLED=${OPENFGA_ENABLED:-true}
    networks:
      - pulse-network
    depends_on:
      mysql:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      openfga:
        condition: service_started  # OpenFGA distroless image has no healthcheck
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      # Mount config files if needed for runtime configuration
      - ../backend/server/src/main/resources/config:/app/config:ro

  # Pulse Alerts Cron Service (Java/Vert.x Cron Manager)
  pulse-alerts-cron:
    build:
      context: ../backend/pulse-alerts-cron
      dockerfile: Dockerfile
    container_name: pulse-alerts-cron
    ports:
      - "4000:4000"
    environment:
      # MySQL Database Configuration
      - MYSQL_WRITER_HOST=mysql
      - MYSQL_READER_HOST=mysql
      - MYSQL_DATABASE=${MYSQL_DATABASE:-pulse_db}
      - MYSQL_USER=${MYSQL_USER:-pulse_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-pulse_password}

      # Application Configuration
      - CONFIG_SERVICE_APPLICATION_PULSESERVERURL=${CONFIG_SERVICE_APPLICATION_PULSESERVERURL:-http://pulse-server:8080}
      - CONFIG_SERVICE_APPLICATION_WEBHOOKURL=${CONFIG_SERVICE_APPLICATION_WEBHOOKURL}
      - CONFIG_SERVICE_APPLICATION_SERVICEJWTSECRET=${CONFIG_SERVICE_APPLICATION_SERVICEJWTSECRET:-dev_service_jwt_secret}
      - CONFIG_SERVICE_APPLICATION_CLICKHOUSEHOST=clickhouse
      - CONFIG_SERVICE_APPLICATION_CLICKHOUSEPORT=8123
      - CONFIG_SERVICE_APPLICATION_CLICKHOUSEDATABASE=otel
      - CONFIG_SERVICE_APPLICATION_CLICKHOUSEUSERNAME=pulse_user
      - CONFIG_SERVICE_APPLICATION_CLICKHOUSEPASSWORD=pulse_password
      - CONFIG_SERVICE_APPLICATION_REDISHOST=${REDIS_HOST:-ascend-redis}
      - CONFIG_SERVICE_APPLICATION_REDISPORT=${REDIS_PORT:-6379}
    networks:
      - pulse-network
    depends_on:
      mysql:
        condition: service_healthy
      pulse-server:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4000/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      # Mount config files if needed for runtime configuration
      - ../backend/pulse-alerts-cron/src/main/resources/config:/app/config:ro

networks:
  pulse-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  clickhouse-data:
    driver: local
  vector-data:
    driver: local


scrape_configs:
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']

  - job_name: 'clickhouse'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['clickhouse:9363']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
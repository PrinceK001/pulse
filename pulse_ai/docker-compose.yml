services:
  pulse-ai-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse-ai-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount agent source for live development — changes reflect instantly
      - ./__init__.py:/app/pulse_ai/__init__.py:ro
      - ./agent.py:/app/pulse_ai/agent.py:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
